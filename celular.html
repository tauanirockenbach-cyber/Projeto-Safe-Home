<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Segura - Live Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }

        .smartphone {
            width: 360px; height: 740px; background: #000; border: 12px solid #333;
            border-radius: 40px; position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Notificação */
        #push { 
            position: absolute; top: -100px; left: 10px; right: 10px; 
            background: #fbbf24; color: #000; padding: 15px; border-radius: 12px; 
            font-weight: bold; transition: 0.5s; z-index: 100; font-size: 0.8rem;
        }

        header { padding: 30px 20px 15px; background: #1e293b; border-bottom: 2px solid #fbbf24; display: flex; justify-content: space-between; align-items: flex-end; }
        
        .device-list { flex: 1; padding: 20px; overflow-y: auto; background: #0f172a; }
        .section-title { font-size: 0.7rem; color: #fbbf24; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .device-card { 
            background: #1e293b; padding: 18px; border-radius: 15px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #334155; transition: 0.5s;
        }
        
        .highlight { border-color: #fbbf24; transform: scale(1.02); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: bold; }
        .st-on { background: #14532d; color: #4ade80; }
        .st-off { background: #450a0a; color: #ef4444; }

        /* Estilo do Formulário de Cadastro */
        #admin-panel {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%; 
            background: #1e293b; padding: 25px; border-radius: 30px 30px 0 0;
            z-index: 200; border-top: 3px solid #fbbf24;
        }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; }
        .btn-add { background: #fbbf24; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .admin-toggle { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="smartphone">
        <div id="push">ALERTA</div>

        <header>
            <div>
                <div style="font-size: 0.6rem; color: #4ade80; font-weight: bold;">● LIVE MONITOR</div>
                <h2 style="font-size:1.1rem;">Residência Master</h2>
            </div>
            <button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>
        </header>

        <div class="device-list" id="lista-dispositivos"></div>

        <div id="admin-panel">
            <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: #fbbf24;">CADASTRAR NOVO OBJETO</h3>
            <input type="text" id="new-name" placeholder="Nome do Objeto (ex: Cerca)">
            <input type="text" id="new-code" placeholder="Código/ID (ex: CX-90)">
            <input type="text" id="new-room" placeholder="Local (ex: Quintal)">
            <button class="btn-add" onclick="adicionarObjeto()">SALVAR DISPOSITIVO</button>
            <button onclick="toggleAdmin()" style="background:none; border:none; color:white; width:100%; margin-top:10px; font-size:0.7rem; cursor:pointer;">FECHAR</button>
        </div>

        <footer style="padding:10px; text-align:center; background:#1e293b; font-size:0.6rem; color:#94a3b8;">
            Vigilância Ativa - Casa Segura
        </footer>
    </div>

    <script>
        let dispositivos = [
            {id: "001", nome: "Portão", local: "Garagem", status: "st-off", txt: "Fechado"},
            {id: "002", nome: "Câmera", local: "Entrada", status: "st-on", txt: "Ativa"}
        ];

        function renderizar() {
            const lista = document.getElementById('lista-dispositivos');
            lista.innerHTML = '<div class="section-title">Dispositivos Conectados</div>';
            
            dispositivos.forEach((d) => {
                lista.innerHTML += `
                    <div class="device-card" id="card-${d.id}">
                        <div>
                            <div style="font-size:0.85rem; font-weight:bold;">${d.nome} <span style="font-size:0.6rem; opacity:0.5;">#${d.id}</span></div>
                            <div style="font-size:0.7rem; color:#94a3b8;">Local: ${d.local}</div>
                        </div>
                        <span class="status-pill ${d.status}">${d.txt}</span>
                    </div>
                `;
            });
        }

        function mudancaAutomatica() {
            if(dispositivos.length === 0) return;
            const index = Math.floor(Math.random() * dispositivos.length);
            const d = dispositivos[index];

            d.status = (d.status === "st-on") ? "st-off" : "st-on";
            d.txt = (d.status === "st-on") ? "Ativo" : "Inativo";

            renderizar();
            const card = document.getElementById(`card-${d.id}`);
            if(card) {
                card.classList.add('highlight');
                mostrarPush(`${d.nome} (#${d.id}) agora está ${d.txt}`);
                setTimeout(() => card.classList.remove('highlight'), 2000);
            }
        }

        function adicionarObjeto() {
            const nome = document.getElementById('new-name').value;
            const id = document.getElementById('new-code').value;
            const local = document.getElementById('new-room').value;

            if(nome && id && local) {
                dispositivos.push({ id, nome, local, status: "st-off", txt: "Inativo" });
                renderizar();
                toggleAdmin();
                mostrarPush(`Novo objeto ${nome} adicionado com sucesso!`);
                
                // Limpa campos
                document.getElementById('new-name').value = '';
                document.getElementById('new-code').value = '';
                document.getElementById('new-room').value = '';
            } else {
                alert("Preencha todos os campos!");
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function mostrarPush(msg) {
            const push = document.getElementById('push');
            push.innerText = msg;
            push.style.top = "15px";
            setTimeout(() => { push.style.top = "-100px"; }, 3000);
        }

        renderizar();
        setInterval(mudancaAutomatica, 5000);
    </script>
</body>
</html>
