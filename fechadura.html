<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Segura - Hardware & Mobile Sync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .container { display: flex; gap: 50px; flex-wrap: wrap; justify-content: center; }

        /* ESTILO DA FECHADURA (HARDWARE) */
        .hardware-box {
            width: 300px; background: #1e293b; padding: 25px; border-radius: 20px;
            border: 4px solid #334155; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lock-display {
            background: #000; color: #fbbf24; padding: 15px; border-radius: 8px;
            font-family: monospace; font-size: 1.1rem; margin-bottom: 20px; border: 1px solid #fbbf24;
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .key {
            background: #334155; color: white; padding: 15px; border-radius: 8px;
            border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem;
        }
        .key:active { background: #fbbf24; color: black; }
        .key-del { background: #7f1d1d; }
        .key-ent { background: #14532d; }
        .btn-action { 
            margin-top: 15px; width: 100%; padding: 10px; border-radius: 8px; 
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* ESTILO DO CELULAR (NOTIFICAÇÃO) */
        #mobile-notification {
            position: fixed; top: 20px; width: 320px; background: #fbbf24; color: #000;
            padding: 15px; border-radius: 12px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; z-index: 100; animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: translateY(-100px); }
            70% { transform: translateY(10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="mobile-notification">
        <span id="notif-msg">Alerta de Segurança!</span>
    </div>

    <h1 style="margin-bottom: 30px; color: #fbbf24;">Integração Ciber-Física</h1>

    <div class="container">
        
        <div class="hardware-box">
            <h3 style="margin-bottom: 15px;">FECHADURA ELETRÔNICA</h3>
            <div class="lock-display" id="display">DIGITE A SENHA</div>
            
            <div class="keypad">
                <button class="key" onclick="addNum('1')">1</button>
                <button class="key" onclick="addNum('2')">2</button>
                <button class="key" onclick="addNum('3')">3</button>
                <button class="key" onclick="addNum('4')">4</button>
                <button class="key" onclick="addNum('5')">5</button>
                <button class="key" onclick="addNum('6')">6</button>
                <button class="key" onclick="addNum('7')">7</button>
                <button class="key" onclick="addNum('8')">8</button>
                <button class="key" onclick="addNum('9')">9</button>
                <button class="key key-del" onclick="limpar()">C</button>
                <button class="key" onclick="addNum('0')">0</button>
                <button class="key key-ent" onclick="abrir()">E</button>
            </div>

            <button id="btn-fechar" class="btn-action" style="background: #475569; color: white; display: none;" onclick="fechar()">
                🔒 Trancar Manualmente
            </button>
        </div>

    </div>

    <div style="margin-top: 40px; text-align: center; max-width: 500px; color: #94a3b8;">
        <p><b>Como testar:</b> Digite <b>123</b> e aperte <b>E</b> para abrir. O botão de trancar aparecerá em seguida. O status será enviado para o banco de dados do seu Aplicativo Mobile automaticamente.</p>
    </div>

<script>
    let senhaDigitada = "";
    const display = document.getElementById('display');
    const notif = document.getElementById('mobile-notification');
    const msgNotif = document.getElementById('notif-msg');
    const btnFechar = document.getElementById('btn-fechar');

    function addNum(n) {
        if(senhaDigitada.length < 4) {
            senhaDigitada += n;
            display.innerText = "* ".repeat(senhaDigitada.length);
        }
    }

    function limpar() {
        senhaDigitada = "";
        display.innerText = "AGUARDANDO...";
        display.style.color = "#fbbf24";
    }

    function abrir() {
        if(senhaDigitada === "123") {
            display.innerText = "🔓 ABERTO";
            display.style.color = "#4ade80";
            btnFechar.style.display = "block"; // Mostra opção de fechar
            enviarStatusMobile("Aberta");
        } else {
            display.innerText = "❌ ERRO";
            display.style.color = "#ef4444";
            setTimeout(limpar, 1500);
        }
    }

    function fechar() {
        display.innerText = "🔒 TRANCADO";
        display.style.color = "#fbbf24";
        btnFechar.style.display = "none";
        senhaDigitada = "";
        enviarStatusMobile("Trancada");
    }

    function enviarStatusMobile(status) {
        // Notificação visual (o "pop-up" do celular)
        msgNotif.innerText = `CASA SEGURA: Porta Principal foi ${status}!`;
        notif.style.display = "block";
        
        // Atualiza o Banco de Dados Local para o outro App ler
        let dados = JSON.parse(localStorage.getItem('appDispositivos')) || [];
        
        // Se a fechadura já existir, atualiza. Se não, cria.
        let fIndex = dados.findIndex(d => d.nome.toLowerCase().includes("fechadura"));
        
        if(fIndex > -1) {
            dados[fIndex].statusTxt = status;
            dados[fIndex].status = (status === "Aberta") ? "st-off" : "st-on";
        } else {
            dados.push({
                nome: "Fechadura Inteligente",
                local: "Entrada",
                status: (status === "Aberta") ? "st-off" : "st-on",
                statusTxt: status
            });
        }
        
        localStorage.setItem('appDispositivos', JSON.stringify(dados));

        // Esconde a notificação após 4 segundos
        setTimeout(() => {
            notif.style.display = "none";
        }, 4000);
    }
</script>
</body>
</html>
